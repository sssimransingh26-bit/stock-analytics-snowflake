1 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Analytics Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Stock Analytics Dashboard</h1>
        <span class="powered">powered by Snowflake</span>
    </header>

    <div class="container">

        <div class="search-bar">
            <input type="text" id="symbolInput" placeholder="Enter stock Symbol"/>
            <button onclick="loadStock()">Search</button>
        </div>

        <div class="symbol-tabs">
            <div class="tab active" onclick="selectTab(this,'AAPL')">AAPL</div>
            <div class="tab" onclick="selectTab(this,'GOOGL')">GOOGL</div>
            <div class="tab" onclick="selectTab(this,'TSLA')">TSLA</div>
        </div>

        <div class="cards">

            <div class="card">
                <h3>Latest Close Price</h3>
                <p id="closePrice">--</p>
            </div>

            <div class="card">
                <h3>Price Change</h3>
                <p id="priceChange">--</p>
                <div class="change" id="percentChange"></div>
            </div>

            <div class="card">
                <h3>7 Day moving avg</h3>
                <p id="movingAvg">--</p>        
            </div>
        </div>

        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Open</th>
                    <th>High</th>
                    <th>Low</th>
                    <th>Close</th>
                    <th>Volume</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" class="loading">Serach for a stock to see data</td></tr>
            </tbody>
        </table>
    </div>

<script src="/static/script.js"></script>
</body>
</html>
